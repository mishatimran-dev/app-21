name: iOS Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Build for iOS Simulator (no code signing)
        run: |
          xcodebuild build \
            -project FinanceApp.xcodeproj \
            -scheme FinanceApp \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
